services:
  lober:
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - 8000:8000
      - 8443:8443
    restart: unless-stopped
    networks:
      - lober
  db:
    image: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=lober
      - POSTGRES_PASSWORD=lober
      - POSTGRES_DB=lober
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
